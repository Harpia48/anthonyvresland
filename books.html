<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books — Anthony Vresland</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0b0f16;
  --panel:#101725;
  --text:#e5e7eb;
  --muted:#8a97aa;
  --accent:#f7a400;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  background:var(--bg);
  color:var(--text);
  font-family:'Crimson Pro',serif;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;
  background:#0b0f16;
  border-bottom:1px solid rgba(255,255,255,0.05);
  z-index:100;
}

.logo{
  font-family:'Cinzel',serif;
  letter-spacing:0.12em;
  color:#fff;
  text-decoration:none;
}

nav{
  display:flex;
  gap:28px;
}

nav a{
  color:var(--text);
  text-decoration:none;
}

nav a.active{
  color:var(--accent);
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:60px 20px;
}

/* TITLE */
.title{
  text-align:center;
  margin-bottom:60px;
}

.title h1{
  font-family:'Cinzel',serif;
  font-size:3rem;
}

.title span{
  color:var(--accent);
}

/* GRID */
.book-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:24px;
}

/* CARD */
.book-card{
  background:var(--panel);
  border-radius:12px;
  padding:16px;
  text-align:center;
  display:flex;
  flex-direction:column;
}

.book-card img{
  width:100%;
  border-radius:8px;
  aspect-ratio:2/3;
  object-fit:cover;
}

.book-card h4{
  margin:12px 0;
  font-family:'Cinzel',serif;
  font-size:0.9rem;
}

.book-card p{
  font-size:0.9rem;
  color:var(--muted);
  flex:1;
}

.btn{
  margin-top:12px;
  padding:8px;
  background:var(--accent);
  color:#000;
  text-decoration:none;
  border-radius:6px;
  font-size:0.75rem;
}
</style>
</head>

<body>

<header>
  <a href="index.html" class="logo">Anthony Vresland</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="books.html" class="active">Books</a>
    <a href="about.html">About</a>
    <a href="music.html">Music</a>
  </nav>
</header>

<div class="container">

<div class="title">
  <h1>Books by <span>Anthony Vresland</span></h1>
</div>

<div class="book-grid">

  <!-- BOOK BLOCK (COPY THIS TO ADD MORE) -->
  <article class="book-card">
    <img src="/assets/homer-iliad.jpg">
    <h4>The Iliad Decoded</h4>
    <p>The War of Troy as the Architecture of the Soul.</p>
    <a class="btn" href="https://a.co/d/0brpMjZl" target="_blank">Amazon</a>
  </article>

  <article class="book-card">
    <img src="/assets/homer-odyssey.png">
    <h4>The Odyssey Decoded</h4>
    <p>The Soul's Return.</p>
    <a class="btn" href="https://www.amazon.com/dp/B0GYQ52SSW" target="_blank">Amazon</a>
  </article>

  <article class="book-card">
    <img src="/assets/myth-of-er-cover.jpg">
    <h4>Plato's Myth of Er</h4>
    <p>A journey through the afterlife and back.</p>
    <a class="btn" href="https://a.co/d/0cBwiyV3" target="_blank">Amazon</a>
  </article>

</div>

</div>

</body>
</html>
